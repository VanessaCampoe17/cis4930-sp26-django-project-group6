<!DOCTYPE html>
<html>
<head>
    <title>{% block title %}Security Events{% endblock %}</title>
</head>
<body>

    {% if messages %}
    <ul class="messages">
        {% for message in messages %}
            <li class="{{ message.tags }}">{{ message }}</li>
        {% endfor %}
    </ul>
    {% endif %}

    <nav>
        <a href="{% url 'home' %}">Home</a>
        <a href="{% url 'record_list' %}">Records</a>
        <a href="{% url 'analytics' %}">Analytics</a>
    </nav>

    {% block content %}
    {% endblock %}

</body>
</html>
